<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; }
  body { background: #17150F; -webkit-font-smoothing: antialiased; text-rendering: optimizeLegibility; }
  ::selection { background: #E5482B; color: #F4F1EA; }
  a { text-decoration: none; color: inherit; }
  @keyframes kzUp { from { opacity: 0; transform: translateY(22px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes kzPulse { 0% { box-shadow: 0 0 0 0 rgba(229,72,43,.6); } 70% { box-shadow: 0 0 0 10px rgba(229,72,43,0); } 100% { box-shadow: 0 0 0 0 rgba(229,72,43,0); } }
  .reveal { opacity: 0; will-change: opacity, transform; }
  .reveal.in { animation: kzUp .85s cubic-bezier(.2,.7,.2,1) forwards; }
  .navlink { position: relative; }
  .navlink::after { content: ''; position: absolute; left: 0; right: 0; bottom: -5px; height: 1px; background: currentColor; transform: scaleX(0); transform-origin: left; transition: transform .35s cubic-bezier(.2,.7,.2,1); }
  .navlink:hover::after { transform: scaleX(1); }
  .pulse { animation: kzPulse 2.6s ease-out infinite; }
  .c-arrow { transition: transform .35s cubic-bezier(.2,.7,.2,1); display: inline-block; }
  a:hover .c-arrow { transform: translate(5px,-5px); }
  @media (prefers-reduced-motion: reduce) {
    .reveal { opacity: 1 !important; }
    .reveal.in, .pulse, .c-arrow { animation: none !important; transition: none !important; }
  }
</style>
</helmet>

<div style="--ink:#17150F; --paper:#F4F1EA; --muted:#9b968c; --line:rgba(244,241,234,0.16); --accent:#E5482B; background:var(--ink); color:var(--paper); font-family:'Helvetica Neue',Helvetica,'Hanken Grotesk',Arial,sans-serif; min-height:100vh; display:flex; flex-direction:column;">

  <header style="display:flex; align-items:center; justify-content:space-between; padding:26px clamp(20px,5vw,72px); border-bottom:1px solid var(--line);">
    <a href="Home.dc.html" style="display:flex; align-items:baseline; gap:12px;">
      <span style="font-weight:500; font-size:25px; letter-spacing:-0.01em;">Katherine Zdanowski</span>
      <span style="font-family:'Space Mono',monospace; font-size:10.5px; letter-spacing:1.5px; text-transform:uppercase; color:var(--muted);">Strategy &amp; Research</span>
    </a>
    <nav style="display:flex; align-items:center; gap:clamp(16px,2.4vw,34px); font-family:'Space Mono',monospace; font-size:12px; letter-spacing:0.8px; text-transform:uppercase;">
      <a href="Home.dc.html" class="navlink" style="color:var(--muted);" style-hover="color:var(--paper);">Index</a>
      <a href="About.dc.html" class="navlink" style="color:var(--muted);" style-hover="color:var(--paper);">About</a>
      <a href="Work.dc.html" class="navlink" style="color:var(--muted);" style-hover="color:var(--paper);">Work</a>
      <a href="Experience.dc.html" class="navlink" style="color:var(--muted);" style-hover="color:var(--paper);">Experience</a>
      <a href="Contact.dc.html" class="navlink" style="color:var(--accent);">Contact</a>
    </nav>
  </header>

  <main style="flex:1; display:flex; flex-direction:column; justify-content:center; padding:clamp(48px,8vw,110px) clamp(20px,5vw,72px);">

    <div class="reveal" style="display:flex; align-items:center; gap:14px; font-family:'Space Mono',monospace; font-size:11.5px; letter-spacing:1.6px; text-transform:uppercase; color:var(--muted); margin-bottom:clamp(26px,4vw,44px);">
      <span style="color:var(--accent);">04</span><span>Contact</span>
    </div>

    <h1 class="reveal" style="font-weight:500; letter-spacing:-0.03em; font-size:clamp(44px,9vw,140px); line-height:0.95; margin:0;">
      Let's turn a hard <span style="color:var(--accent);">customer question</span> into a clear answer.
    </h1>

    <div style="display:grid; grid-template-columns:repeat(auto-fit,minmax(220px,1fr)); gap:clamp(20px,3vw,40px); margin-top:clamp(48px,7vw,96px); max-width:1000px;">
      <a href="https://www.linkedin.com/in/katherine-zdanowski/" target="_blank" class="reveal" style="border-top:1px solid var(--line); padding-top:18px; display:block; transition:color .2s;" style-hover="color:var(--accent);">
        <div style="font-family:'Space Mono',monospace; font-size:10.5px; letter-spacing:1.6px; text-transform:uppercase; color:var(--muted); margin-bottom:10px;">LinkedIn</div>
        <div style="font-weight:500; letter-spacing:-0.01em; font-size:clamp(20px,2vw,26px);">in/katherine-zdanowski <span class="c-arrow">↗</span></div>
      </a>
      <a href="mailto:hello@katherinezdanowski.com" class="reveal" style="border-top:1px solid var(--line); padding-top:18px; display:block; transition:color .2s;" style-hover="color:var(--accent);">
        <div style="font-family:'Space Mono',monospace; font-size:10.5px; letter-spacing:1.6px; text-transform:uppercase; color:var(--muted); margin-bottom:10px;">Email</div>
        <div style="font-weight:500; letter-spacing:-0.01em; font-size:clamp(20px,2vw,26px);">[ add your email ] <span class="c-arrow">↗</span></div>
      </a>
      <div class="reveal" style="border-top:1px solid var(--line); padding-top:18px;">
        <div style="font-family:'Space Mono',monospace; font-size:10.5px; letter-spacing:1.6px; text-transform:uppercase; color:var(--muted); margin-bottom:10px;">Based in</div>
        <div style="font-weight:500; letter-spacing:-0.01em; font-size:clamp(20px,2vw,26px);">Toronto / Remote</div>
      </div>
      <a href="Experience.dc.html" class="reveal" style="border-top:1px solid var(--line); padding-top:18px; display:block; transition:color .2s;" style-hover="color:var(--accent);">
        <div style="font-family:'Space Mono',monospace; font-size:10.5px; letter-spacing:1.6px; text-transform:uppercase; color:var(--muted); margin-bottom:10px;">Résumé</div>
        <div style="font-weight:500; letter-spacing:-0.01em; font-size:clamp(20px,2vw,26px);">Download CV <span class="c-arrow">↗</span></div>
      </a>
    </div>
  </main>

  <footer style="display:flex; flex-wrap:wrap; gap:16px; align-items:center; justify-content:space-between; padding:22px clamp(20px,5vw,72px); border-top:1px solid var(--line); font-family:'Space Mono',monospace; font-size:11px; letter-spacing:0.6px; color:var(--muted);">
    <a href="Home.dc.html" class="navlink" style="color:var(--paper);" style-hover="color:var(--accent);">← Index</a>
    <span style="text-transform:uppercase; letter-spacing:1.4px;">Open to projects · 2026</span>
    <span style="color:var(--accent); display:flex; align-items:center; gap:8px;"><span class="pulse" style="width:8px; height:8px; border-radius:50%; background:var(--accent);"></span>Available</span>
  </footer>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  componentDidMount() {
    const reveal = () => {
      const vh = window.innerHeight || 800;
      document.querySelectorAll('.reveal:not(.in)').forEach((el, i) => {
        const r = el.getBoundingClientRect();
        if (r.top < vh * 0.92 && r.bottom > -40) {
          if (!el.style.animationDelay) el.style.animationDelay = Math.min(i * 70, 420) + 'ms';
          el.classList.add('in');
        }
      });
    };
    this._reveal = reveal;
    reveal();
    window.addEventListener('scroll', reveal, { passive: true });
    window.addEventListener('resize', reveal);
    [80, 250, 600].forEach((d) => setTimeout(reveal, d));
    setTimeout(() => document.querySelectorAll('.reveal.in').forEach((e) => { e.style.opacity = '1'; }), 1500);
  }
  componentWillUnmount() {
    if (this._reveal) { window.removeEventListener('scroll', this._reveal); window.removeEventListener('resize', this._reveal); }
  }
  renderVals() { return {}; }
}
</script>
</body>
</html>
